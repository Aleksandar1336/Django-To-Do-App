{% extends "base.html" %}
{% block title %}My To-Do List{% endblock %}
{% block content %}
    <h1>To-Do List</h1>
    <a href="{% url 'add_task' %}">Add New Task</a>
    <ul>
        {% for task in tasks %}
            <li>
                <a href="{% url 'task_detail' task.pk %}">{{ task.title }}</a>
                -
                {% if task.completed %}
                    Done
                {% else %}
                    Pending
                {% endif %}
            </li>
        {% empty %}
            <li>No tasks yet!</li>
        {% endfor %}
    </ul>
{% endblock %}
